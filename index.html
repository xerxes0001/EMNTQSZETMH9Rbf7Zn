<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rajashree ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background-color: #080808; color: #ffffff; overflow-x: hidden; font-family: sans-serif; margin: 0; scroll-behavior: smooth; }
        
        .polaroid {
            background: #ffffff; padding: 8px 8px 30px 8px; border-radius: 2px;
            box-shadow: 0 10px 25px rgba(209, 179, 255, 0.2); width: 100%;
        }
        .polaroid img, .polaroid video { width: 100%; height: auto; object-fit: contain; display: block; background: #eee; }
        .caption-text { color: #333; text-align: center; font-family: 'Georgia', serif; font-size: 0.75rem; margin-top: 8px; font-weight: bold; }

        .timeline-wrap { position: relative; max-width: 500px; margin: 50px auto; padding: 0 20px; }
        .timeline-line { position: absolute; left: 30px; width: 3px; height: 100%; background: linear-gradient(to bottom, #D1B3FF, #a855f7); }
        .timeline-block { position: relative; margin-bottom: 60px; padding-left: 60px; }
        .age-marker { 
            position: absolute; left: 18px; width: 26px; height: 26px; 
            background: #a855f7; border: 4px solid #080808; border-radius: 50%; z-index: 10;
        }
        .year-label { color: #D1B3FF; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; display: block; }

        .hidden-section { display: none; }
        .btn-purple { background: linear-gradient(135deg, #a855f7 0%, #D1B3FF 100%); color: #000; transition: all 0.3s; }
    </style>
</head>
<body class="text-left">

    <div id="music-container"></div>

    <div id="phase1" class="p-6 text-center animate__animated animate__fadeIn">
        <h1 class="text-3xl font-bold mb-8 mt-4" style="color: #D1B3FF;">Happy Birthday Rajashree! ❤️</h1>
        <div class="space-y-8">
            <div class="polaroid mx-auto max-w-[300px]" style="transform: rotate(-2deg);"><video autoplay muted loop playsinline><source src="1778037251143.mp4" type="video/mp4"></video></div>
            <div class="polaroid mx-auto max-w-[300px]" style="transform: rotate(3deg);"><video autoplay muted loop playsinline><source src="VID-20260124-WA0003(1).mp4" type="video/mp4"></video></div>
            <div class="polaroid mx-auto max-w-[300px]" style="transform: rotate(-1deg);"><video autoplay muted loop playsinline><source src="doc_2026-05-06_13-28-43.mp4" type="video/mp4"></video></div>
        </div>
        <button onclick="goToPhase2()" class="btn-purple px-10 py-4 rounded-full font-bold shadow-2xl mt-12 mb-10 text-lg">Enter Her Journey →</button>
    </div>

    <div id="phase2" class="hidden-section animate__animated p-4">
        <h1 class="text-3xl font-bold text-center mb-10" style="color: #D1B3FF;">Her Journey 🌸</h1>
        <div class="timeline-wrap">
            <div class="timeline-line"></div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">Roots</span>
                <div class="polaroid"><img src="aaji"><p class="caption-text">With Aaji ❤️</p></div>
            </div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">Boss Vibes</span>
                <div class="polaroid"><img src="don"><p class="caption-text">Don Era 😎</p></div>
            </div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">New Looks</span>
                <div class="grid grid-cols-2 gap-2">
                    <div class="polaroid"><img src="haircut-1"></div>
                    <div class="polaroid"><img src="haircut-2"></div>
                </div>
            </div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">Throwback</span>
                <div class="polaroid"><img src="crybaby"><p class="caption-text">Professional crybaby 🍼</p></div>
            </div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">Festival</span>
                <div class="space-y-4">
                    <div class="polaroid"><img src="Holi-4"></div>
                    <div class="polaroid"><img src="Holi grp"></div>
                    <div class="polaroid"><img src="holi-2-1"></div>
                </div>
            </div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">Adventure</span>
                <div class="polaroid"><img src="trek"><p class="caption-text">Trekking days 🏔️</p></div>
            </div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">Bold in Red</span>
                <div class="grid grid-cols-2 gap-2">
                    <img src="red shirt" class="rounded border">
                    <img src="red shirt-2" class="rounded border">
                    <img src="red shirt-3" class="rounded border">
                    <img src="red shirt-4" class="rounded border">
                </div>
            </div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">Elegance</span>
                <div class="grid grid-cols-2 gap-2">
                    <div class="polaroid"><img src="kurta-1"></div>
                    <div class="polaroid"><img src="kurta-2"></div>
                </div>
            </div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">Traditions</span>
                <div class="space-y-4">
                    <div class="polaroid"><img src="menhdi"></div>
                    <div class="polaroid"><img src="traditional"></div>
                    <div class="polaroid"><img src="wedding"></div>
                </div>
            </div>

            <div class="timeline-block"><div class="age-marker"></div><span class="year-label">The Legend</span>
                <div class="polaroid"><img src="bevdi"><p class="caption-text">Best energy ever 😂 🥂</p></div>
            </div>
        </div>

        <div class="text-center p-12">
            <button onclick="goToPhase3()" class="btn-purple px-10 py-4 rounded-full font-bold shadow-2xl">DO NOT CLICK ❌</button>
        </div>
    </div>

    <script>
        function goToPhase2() {
            const music = document.getElementById('music-container');
            music.innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/QJO3ROT-A4E?autoplay=1" frameborder="0" allow="autoplay"></iframe>';
            document.getElementById('phase1').style.display = 'none';
            const p2 = document.getElementById('phase2');
            p2.style.display = 'block';
            p2.classList.add('animate__fadeInRight');
            window.scrollTo(0, 0);
        }

        function goToPhase3() {
            alert("Vine Boom sequence coming next!");
        }
    </script>
</body>
</html>
