<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rajashree ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        /* This matches the exact purple from your image */
        body { background-color: #D1B3FF; } 
        .custom-purple { background-color: #D1B3FF; }
        .heart { position: fixed; color: #ffffff; font-size: 20px; z-index: -1; animation: float 3s linear infinite; }
        @keyframes float { from { transform: translateY(100vh); opacity: 1; } to { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body class="text-gray-800 font-sans">

    <iframe id="audioPlayer" width="0" height="0" src="https://www.youtube.com/embed/QJO3ROT-A4E?enablejsapi=1" frameborder="0" allow="autoplay"></iframe>

    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="animate__animated animate__fadeInDown bg-white/90 backdrop-blur-sm p-8 rounded-3xl shadow-2xl max-w-sm w-full border-b-8 border-white">
            
            <div class="w-24 h-24 custom-purple rounded-full mx-auto mb-4 flex items-center justify-center shadow-lg animate__animated animate__pulse animate__infinite">
                <span class="text-4xl text-white">💜</span>
            </div>

            <h1 class="text-4xl font-bold text-indigo-900 mb-2">Happy Birthday!</h1>
            <h2 class="text-2xl font-semibold text-purple-600 mb-6">Rajashree ❤️</h2>
            
            <p class="text-lg text-gray-700 leading-relaxed mb-8">
                "You don't know you're beautiful... but everyone else does. Wishing you the best day ever!"
            </p>

            <button onclick="playGift()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-full shadow-xl transition transform active:scale-90">
                Tap for your gift 🎁
            </button>

            <div id="message" class="hidden mt-8 animate__animated animate__fadeIn">
                <p class="text-indigo-900 font-bold italic text-xl">I'm so glad you're in my life! ✨</p>
                <div class="mt-4 text-3xl">🎂 🎉 🎈</div>
            </div>
        </div>
    </div>

    <script>
        function playGift() {
            // Show the hidden message
            document.getElementById('message').classList.remove('hidden');
            
            // Play the One Direction song
            const player = document.getElementById('audioPlayer');
            player.src += "&autoplay=1";

            // Launch floating hearts
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '💜';
                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 5000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
