<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>For Rajashree ❤️</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
        rel="stylesheet"
    >

    <style>

        html,
        body{
            margin:0;
            padding:0;
            overflow-x:hidden;
            background:#080808;
            color:white;
            font-family:sans-serif;
            max-width:100%;
            -webkit-tap-highlight-color:transparent;
        }

        body{
            position:relative;
        }

        /* LOCK SCREEN */

        #lockOverlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;

            background:#080808;

            z-index:9000;

            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            text-align:center;
        }

        /* FALLING HEARTS */

        .falling-heart{
            position:fixed;
            top:-5vh;

            color:#D1B3FF !important;

            text-shadow:
            0 0 10px rgba(209,179,255,0.9),
            0 0 20px rgba(209,179,255,0.4);

            font-size:28px;

            z-index:8500;

            animation:fallHeart linear forwards;

            pointer-events:none;
        }

        @keyframes fallHeart{
            to{
                transform:
                translateY(115vh)
                rotate(360deg);
            }
        }

        /* START SCREEN */

        #startOverlay{
            display:none;

            width:100%;
            min-height:100vh;

            background:
            radial-gradient(circle,#e2c08d 0%,#c19a6b 100%);

            z-index:5500;

            flex-direction:column;
            align-items:center;

            padding:80px 20px 150px 20px;

            box-shadow:
            inset 0 0 100px rgba(0,0,0,0.5);

            overflow-y:auto;

            scroll-behavior:smooth;
        }

        #typewriterText{
            font-family:'Georgia',serif;
            font-style:italic;
            font-size:1.25rem;
            line-height:1.8;
            color:#3d2b1f;
            text-align:center;
            max-width:600px;
        }

        .word{
            opacity:0;
            display:inline-block;
            margin-right:5px;
            transition:opacity 0.4s ease;
        }

        .word.visible{
            opacity:1;
        }

        /* POLAROIDS */

        .polaroid{
            background:#ffffff;

            padding:10px 10px 35px 10px;

            border-radius:2px;

            box-shadow:
            0 10px 30px rgba(209,179,255,0.4);

            width:280px;

            margin:30px auto;

            color:#333;
        }

        .polaroid img,
        .polaroid video{
            width:100%;
            height:auto;
            display:block;
            background:#000;
            border-radius:6px;
            object-fit:cover;
        }

        .pol-cap{
            text-align:center;
            font-style:italic;
            font-weight:bold;
            margin-top:10px;
            font-size:0.95rem;
        }

        .nickname-label{
            color:#D1B3FF;
            font-size:2.2rem;
            font-weight:bold;
            margin-top:60px;
            text-align:center;
        }

        .arrow-connector{
            color:#444;
            font-size:45px;
            margin:20px 0;
            text-align:center;
        }

        /* FALLING PHOTO */

        .falling-photo{
            position:fixed;
            top:-30vh;

            z-index:8000;

            width:155px;

            padding:8px;

            background:#fff;

            box-shadow:
            0 15px 35px rgba(0,0,0,0.8);

            animation:fallPhoto linear forwards;

            touch-action:none;

            will-change:transform;
        }

        @keyframes fallPhoto{
            to{
                transform:
                translateY(130vh)
                rotate(360deg);
            }
        }

        /* FINAL */

        #photoViewer{
            display:none;

            position:fixed;
            top:0;
            left:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.98);

            z-index:11000;

            align-items:center;
            justify-content:center;
        }

        #bigImg{
            max-width:95vw;
            max-height:95vh;
            border-radius:12px;
        }

        .blur-reveal{
            filter:blur(45px);
            transition:filter 3s ease-in-out;
        }

        .clear-now{
            filter:blur(0px)!important;
        }

        /* TIMER */

        #timer{
            margin-top:20px;
            font-size:1.8rem;
            color:#ff4d4d;
            font-family:monospace;
        }

    </style>
</head>

<body onload="startLockHearts()">

<!-- LOCK -->

<div id="lockOverlay">

    <h2
        class="text-2xl mb-8 text-purple-300 font-bold"
        style="position:relative;z-index:10000"
    >
        Enter the Secret Code 🔐
    </h2>

    <input
        type="password"
        id="passInput"

        class="bg-zinc-900 border-2 border-purple-400
        p-4 rounded-xl mb-6 text-center text-xl
        w-64 outline-none text-white"

        placeholder="Password"

        style="position:relative;z-index:10000"
    >

    <button
        onclick="checkPass()"

        class="bg-purple-600 text-white
        px-14 py-4 rounded-full font-bold
        active:scale-95 shadow-lg"

        style="position:relative;z-index:10000"
    >
        Unlock Surprise
    </button>

    <div
        id="timer"

        style="position:relative;z-index:10000"
    ></div>

</div>

<!-- START -->

<div id="startOverlay">

    <h1 class="text-3xl font-bold mb-4 text-stone-800">
        Happy Birthday Rajashree 🎂 ⏳
    </h1>

    <div id="typewriterText"></div>

    <button
        id="giftBtn"

        onclick="startMainSite()"

        class="bg-stone-800 text-amber-50
        px-12 py-5 rounded-full shadow-2xl
        font-bold mt-12 mb-20"

        style="display:none;"
    >
        Open My Gift 🎁
    </button>

</div>

<!-- AUDIO -->

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<audio id="reveal-audio">
    <source src="reveal.mp3" type="audio/mp3">
</audio>

<!-- MAIN -->

<div id="mainContent" class="hidden">

    <div class="p-6 text-center">

        <h1 class="text-4xl font-bold mb-12 text-purple-300">
            Our Story ❤️
        </h1>

        <!-- VIDEOS -->

        <div class="polaroid">
            <video
                id="v1"
                loop
                muted
                playsinline
                preload="metadata"
            >
                <source src="video1.mp4" type="video/mp4">
            </video>

            <p class="pol-cap">Gorgeous ❤️</p>
        </div>

        <div class="polaroid">
            <video
                id="v2"
                loop
                muted
                playsinline
                preload="metadata"
            >
                <source src="video2.mp4" type="video/mp4">
            </video>

            <p class="pol-cap">Don 😎</p>
        </div>

        <div class="polaroid">
            <video
                id="v3"
                loop
                muted
                playsinline
                preload="metadata"
            >
                <source src="video3.mp4" type="video/mp4">
            </video>

            <p class="pol-cap">Pillu 🍼</p>
        </div>

        <!-- TIMELINE BUTTON -->

        <button
            onclick="unlockTimeline()"

            class="bg-purple-600 text-white
            px-14 py-5 rounded-full mt-16
            font-bold shadow-xl"
        >
            Open the Timeline ↓
        </button>

        <!-- TIMELINE -->

        <div id="timelineSection" class="hidden">

            <div class="nickname-label">
                Mehndi 🌸
            </div>

            <div
                class="polaroid"
                onclick="viewPhoto('mehndi.jpg')"
            >
                <img src="mehndi.jpg">

                <p class="pol-cap">
                    Beautiful ❤️
                </p>
            </div>

            <div class="arrow-connector">↓</div>

            <div class="nickname-label">
                Wedding ✨
            </div>

            <div
                class="polaroid"
                onclick="viewPhoto('wedding.jpg')"
            >
                <img src="wedding.jpg">
            </div>

            <div class="arrow-connector">↓</div>

            <div class="nickname-label">
                Holi 🌈
            </div>

            <div
                class="polaroid"
                onclick="viewPhoto('holi.jpg')"
            >
                <img src="holi.jpg">
            </div>

            <div class="arrow-connector">↓</div>

            <div class="nickname-label">
                Red Shirt Era ❤️
            </div>

            <div
                class="polaroid"
                onclick="viewPhoto('red-shirt.jpg')"
            >
                <img src="red-shirt.jpg">
            </div>

            <div
                class="polaroid"
                onclick="viewPhoto('red-shirt-2.jpg')"
            >
                <img src="red-shirt-2.jpg">
            </div>

            <div class="arrow-connector">↓</div>

            <div class="nickname-label">
                Favorite Moments ✨
            </div>

            <div
                class="polaroid"
                onclick="viewPhoto('photo.jpg')"
            >
                <img src="photo.jpg">
            </div>

            <!-- FINAL BUTTON -->

            <button
                onclick="startFinalSurprise()"

                class="mt-28 mb-44
                bg-gradient-to-r
                from-purple-500 to-indigo-400
                text-black px-16 py-7
                rounded-full font-bold shadow-2xl"
            >
                Final Surprise ✨
            </button>

        </div>

    </div>

    <!-- FINAL -->

    <div
        id="act3"
        class="hidden min-h-screen
        flex items-center justify-center"
    >

        <div
            class="polaroid blur-reveal"
            id="bevdiFrame"

            style="width:320px;"
        >
            <img src="photo.jpg">

            <p class="pol-cap">
                Wait for it...
            </p>
        </div>

    </div>

</div>

<!-- VIEWER -->

<div
    id="photoViewer"
    onclick="closeViewer()"
>
    <img id="bigImg" src="">
</div>

<script>

    /* LETTER */

    const message =
    "I first saw you during our 10th grade, and since then, I have had a crush on you. We had our verbal abuse competitions several times, and the second time, you were the clear winner. I was quite dumb, even when you tried to contact me through Telegram. I should have understood the obvious signs and the subtle hints you dropped—like keeping good profile pictures, which I did save, just in case I ever found the courage to propose. But I never did. You know, destiny works in beautiful ways. You were the one who proposed to me; you were the one who caught the hint I dropped: 'You are blunt... Tu tondavar bolte sagla.' Then you practiced for a month just to propose to me on the very first day of the year—01/01/2026. This was the best New Year present for me—starting the year with the very person I love. I know I messed up quite a lot, but you understood my dumb behavior and forgave me so many times. I have hurt you, but it was never intentional, and it never will be. All I ever want is for you to be happy. Happy Birthday, BonBon / Pillu (Rajashree). I love you so much, my darling.";

    /* SNOW PHOTOS */

    const snowfallPhotos = [

        'mehndi.jpg',
        'wedding.jpg',
        'holi.jpg',
        'red-shirt.jpg',
        'red-shirt-2.jpg',
        'traditional.jpg',
        'kurta-1.jpg',
        'kurta-2.jpg',
        'photo.jpg'

    ];

    /* TIMER */

    const targetDate =
    new Date("May 9, 2026 00:00:00").getTime();

    /* HEARTS */

    function startLockHearts(){

        setInterval(() => {

            const h =
            document.createElement('div');

            h.innerText = '❤️';

            h.className = 'falling-heart';

            h.style.left =
            Math.floor(Math.random() * 95) + 'vw';

            h.style.animationDuration =
            (Math.random() * 3 + 3) + 's';

            document.body.appendChild(h);

            setTimeout(() => {

                if(h.parentNode){

                    h.remove();
                }

            }, 6000);

        }, 350);
    }

    /* PASSWORD */

    function checkPass(){

        const enteredPass =
        document.getElementById('passInput')
        .value
        .trim();

        /* PASSWORD */

        if(enteredPass === "BonBon"){

            document.getElementById('lockOverlay')
            .style.display = 'none';

            document.getElementById('startOverlay')
            .style.display = 'flex';

            const music =
            document.getElementById('bgMusic');

            if(music){

                music.volume = 0.7;

                music.play().catch(() => {});
            }

            typeWriter(message, 'typewriterText', 180);

        }else{

            alert("Wrong Password ❤️");
        }
    }

    /* TYPEWRITER */

    function typeWriter(text, targetId, speed){

        const container =
        document.getElementById(targetId);

        const overlay =
        document.getElementById('startOverlay');

        const words = text.split(" ");

        words.forEach((word, i) => {

            const span =
            document.createElement('span');

            span.innerText = word;

            span.className = 'word';

            container.appendChild(span);

            setTimeout(() => {

                span.classList.add('visible');

                overlay.scrollTop =
                overlay.scrollHeight;

                if(i === words.length - 1){

                    document.getElementById('giftBtn')
                    .style.display = 'block';
                }

            }, i * speed);
        });
    }

    /* MAIN */

    function startMainSite(){

        document.getElementById('startOverlay')
        .style.display = 'none';

        document.getElementById('mainContent')
        .classList.remove('hidden');

        window.scrollTo(0,0);

        ['v1','v2','v3'].forEach(id => {

            const vid =
            document.getElementById(id);

            if(vid){

                vid.play().catch(()=>{});
            }
        });
    }

    /* TIMELINE */

    function unlockTimeline(){

        document.getElementById('timelineSection')
        .classList.remove('hidden');

        document.getElementById('timelineSection')
        .scrollIntoView({
            behavior:'smooth'
        });
    }

    /* FINAL */

    function startFinalSurprise(){

        document.getElementById('act3')
        .classList.remove('hidden');

        document.getElementById('act3')
        .scrollIntoView({
            behavior:'smooth'
        });

        setTimeout(() => {

            const reveal =
            document.getElementById('reveal-audio');

            if(reveal){

                reveal.play().catch(()=>{});
            }

            document.getElementById('bevdiFrame')
            .classList.add('clear-now');

            setTimeout(() => {

                startPhotoSnow();

            }, 4000);

        }, 3000);
    }

    /* PHOTO SNOW */

    let snowInterval;

    function startPhotoSnow(){

        if(snowInterval) return;

        snowInterval = setInterval(() => {

            const img =
            snowfallPhotos[
                Math.floor(
                    Math.random() *
                    snowfallPhotos.length
                )
            ];

            const el =
            document.createElement('div');

            el.className =
            'falling-photo polaroid';

            el.style.left =
            (Math.random() * 80) + 'vw';

            el.style.animationDuration =
            (Math.random() * 2 + 4) + 's';

            el.onclick = (e) => {

                e.stopPropagation();

                viewPhoto(img);
            };

            el.innerHTML = `
                <img src="${img}">
                <p class="pol-cap"
                style="font-size:0.5rem">
                Pillu 💜
                </p>
            `;

            document.body.appendChild(el);

            setTimeout(() => {

                if(el.parentNode){

                    el.remove();
                }

            }, 7000);

        }, 600);
    }

    /* VIEW PHOTO */

    function viewPhoto(img){

        const bigImg =
        document.getElementById('bigImg');

        bigImg.src = img;

        document.getElementById('photoViewer')
        .style.display = 'flex';
    }

    function closeViewer(){

        document.getElementById('photoViewer')
        .style.display = 'none';
    }

    /* COUNTDOWN */

    setInterval(() => {

        const timer =
        document.getElementById('timer');

        if(!timer) return;

        const now =
        new Date().getTime();

        const diff =
        targetDate - now;

        if(diff <= 0){

            timer.innerText =
            "HAPPY BIRTHDAY! ❤️";

            return;
        }

        const days =
        Math.floor(
            diff / (1000 * 60 * 60 * 24)
        );

        const hrs =
        Math.floor(
            (diff % (1000 * 60 * 60 * 24))
            /
            (1000 * 60 * 60)
        );

        const mins =
        Math.floor(
            (diff % (1000 * 60 * 60))
            /
            (1000 * 60)
        );

        const secs =
        Math.floor(
            (diff % (1000 * 60))
            / 1000
        );

        timer.innerText =
        `${days}d ${hrs}h ${mins}m ${secs}s`;

    }, 1000);

</script>

</body>
</html>
