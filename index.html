<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rajashree ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background-color: #080808; color: #ffffff; overflow-x: hidden; font-family: sans-serif; margin: 0; padding-bottom: 250px; scroll-behavior: smooth; }
        
        /* Start Overlay: Fixes the Audio/Autoplay Issue */
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #080808; z-index: 2000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .polaroid {
            background: #ffffff; padding: 10px 10px 40px 10px; border-radius: 2px;
            box-shadow: 0 10px 30px rgba(209, 179, 255, 0.3); width: 280px;
            flex: 0 0 280px; scroll-snap-align: center; position: relative; z-index: 10;
        }
        
        .timeline-polaroid { width: 90%; max-width: 320px; margin: 30px auto; flex: none; }

        .polaroid video, .polaroid img { 
            width: 100%; height: auto; max-height: 400px; 
            display: block; object-fit: contain; background: #000; 
        }

        .pol-cap { color: #333; text-align: center; font-family: 'Georgia', serif; font-style: italic; margin-top: 15px; font-size: 0.95rem; font-weight: bold; }

        .nickname-label { color: #D1B3FF; font-size: 1.8rem; font-weight: bold; margin: 50px 0 10px 0; text-align: center; }
        .arrow-connector { color: #444; font-size: 40px; margin: 15px 0; text-align: center; }

        .falling-photo {
            position: fixed; top: -25vh; z-index: 100; animation: fallDown linear forwards;
            width: 115px; padding: 5px; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); cursor: pointer;
        }
        @keyframes fallDown { to { transform: translateY(125vh) rotate(360deg); } }

        .heart-snow { position: fixed; font-size: 22px; z-index: 99; animation: floatUp linear infinite; pointer-events: none; }
        @keyframes floatUp { from { transform: translateY(100vh); opacity: 1; } to { transform: translateY(-10vh); opacity: 0; } }

        .blur-reveal { filter: blur(40px); transition: filter 2.5s ease-in-out; }
        .clear-now { filter: blur(0px) !important; }

        #photoViewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center;
        }

        #audio-storage { position: absolute; width: 0; height: 0; overflow: hidden; }
        .video-strip { display: flex; overflow-x: auto; gap: 15px; padding: 40px 15px; justify-content: flex-start; align-items: center; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .video-strip::-webkit-scrollbar { display: none; }
        @media (min-width: 600px) { .video-strip { justify-content: center; } }
    </style>
</head>
<body class="text-center">

    <div id="startOverlay">
        <h1 class="text-4xl font-bold mb-4 animate__animated animate__zoomIn">Happy Birthday Rajashree 🎂✨💜</h1>
        <p class="mb-8 text-purple-300">Tap the button to start your surprise</p>
        <button onclick="startEverything()" class="bg-purple-600 text-white px-12 py-5 rounded-full font-bold shadow-2xl text-xl animate__animated animate__pulse animate__infinite">
            Open My Gift 🎁
        </button>
    </div>

    <div id="audio-storage"></div>
    <audio id="reveal-audio" src="abhi-maza-ayagga (mp3cut.net).mp3"></audio>

    <div id="act1" class="p-6">
        <h1 class="text-3xl font-bold mt-8 mb-4">Our Story ❤️</h1>
        <div class="video-strip">
            <div class="polaroid" style="transform: rotate(-3deg);">
                <video id="v1" loop muted playsinline><source src="1778037251143.mp4" type="video/mp4"></video>
            </div>
            <div class="polaroid" style="transform: rotate(2deg);">
                <video id="v2" loop muted playsinline><source src="VID-20260124-WA0003(1).mp4" type="video/mp4"></video>
            </div>
            <div class="polaroid" style="transform: rotate(-1deg);">
                <video id="v3" loop muted playsinline><source src="doc_2026-05-06_13-28-43.mp4" type="video/mp4"></video>
            </div>
        </div>
        <button onclick="unlockTimeline()" class="mt-8 bg-purple-600 text-white px-10 py-4 rounded-full font-bold shadow-lg">Open the Timeline ↓</button>
    </div>

    <div id="act2" class="hidden p-6">
        <div class="nickname-label">Pillu 🍼</div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(2deg);"><img src="crybaby"><p class="pol-cap">Where it started</p></div>
        <div class="arrow-connector">↓</div>
        <div class="nickname-label">With Aaji ❤️</div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(-2deg);"><img src="aaji"></div>
        <div class="arrow-connector">↓</div>
        <div class="nickname-label">The Haircut Days 💇‍♀️</div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(1deg);"><img src="haircut-1"></div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(-2deg);"><img src="haircut-2"></div>
        <div class="arrow-connector">↓</div>
        <div class="nickname-label">Traditional Vibes 🌸</div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(2deg);"><img src="traditional"></div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(-1deg);"><img src="menhdi"></div>
        <div class="arrow-connector">↓</div>
        <div class="nickname-label">Trek & Adventure ⛰️</div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(3deg);"><img src="trek"></div>
        <div class="arrow-connector">↓</div>
        <div class="nickname-label">Holi Colors 🌈</div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(-2deg);"><img src="Holi-4"></div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(1deg);"><img src="Holi grp"></div>
        <div class="arrow-connector">↓</div>
        <div class="nickname-label">Style Icon 🕶️</div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(-1deg);"><img src="red shirt"></div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(2deg);"><img src="kurta-1"></div>
        <div class="arrow-connector">↓</div>
        <div class="nickname-label">Bevdi ❤️</div>
        <div class="polaroid timeline-polaroid" style="transform: rotate(-3deg);"><img src="wedding"></div>

        <button onclick="startFinalSurprise()" class="mt-16 mb-20 bg-gradient-to-r from-purple-500 to-indigo-400 text-black px-12 py-5 rounded-full font-bold shadow-2xl">Final Surprise ✨</button>
    </div>

    <div id="act3" class="hidden min-h-screen flex flex-col items-center justify-center p-6">
        <div class="polaroid blur-reveal" id="bevdiFrame">
            <img src="bevdi">
            <p class="pol-cap" id="statusText">Wait for it...</p>
        </div>
        <div id="finalMessage" class="opacity-0 transition-opacity duration-1000 text-2xl font-serif italic mt-24 text-purple-200">
            "I love you BonBon"
        </div>
    </div>

    <div id="photoViewer" onclick="this.style.display='none'">
        <div class="polaroid" style="max-width: 95vw; width: auto;"><img id="bigImg" src="" style="max-height: 80vh;"><p class="pol-cap">Tap to Close</p></div>
    </div>

    <script>
        const allPhotos = ['crybaby', 'don', 'aaji', 'haircut-1', 'haircut-2', 'holi-2-1', 'kurta-1', 'kurta-2', 'menhdi', 'red shirt', 'red shirt-2', 'red shirt-3', 'red shirt-4', 'traditional', 'trek', 'wedding', 'Holi grp', 'Holi-4', 'IMG-20260123-WA0038(3).jpg', 'IMG-20260123-WA0039.jpg', 'IMG-20260123-WA0047.jpg', 'IMG-20260124-WA0007(1).jpg'];
        
        let heartInterval;

        function startEverything() {
            // Remove overlay
            document.getElementById('startOverlay').style.display = 'none';

            // Start One Direction Music
            const container = document.getElementById('audio-storage');
            container.innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/QJO3ROT-A4E?autoplay=1" frameborder="0" allow="autoplay"></iframe>';

            // Play videos
            document.getElementById('v1').play();
            document.getElementById('v2').play();
            document.getElementById('v3').play();

            // Start Heart Snow
            startHeartSnow();
        }

        function unlockTimeline() {
            document.getElementById('act2').classList.remove('hidden');
            document.getElementById('act2').scrollIntoView({ behavior: 'smooth' });
        }

        function startFinalSurprise() {
            document.getElementById('act3').classList.remove('hidden');
            document.getElementById('act3').scrollIntoView({ behavior: 'smooth' });

            setTimeout(() => {
                document.getElementById('audio-storage').innerHTML = ""; 
                document.getElementById('reveal-audio').play(); 
                document.getElementById('bevdiFrame').classList.add('clear-now');
                document.getElementById('statusText').innerHTML = "ABHI MAZA AAYEGA, NA BIDU! 😎🍷";

                setTimeout(() => { document.getElementById('finalMessage').style.opacity = "1"; }, 1000);

                setTimeout(() => { 
                    clearInterval(heartInterval); 
                    document.querySelectorAll('.heart-snow').forEach(h => h.remove());
                    startPhotoSnow(); 
                }, 5000);
            }, 3500); 
        }

        function startHeartSnow() {
            heartInterval = setInterval(() => {
                const h = document.createElement('div');
                h.innerHTML = '💜'; h.className = 'heart-snow';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, 300);
        }

        function startPhotoSnow() {
            setInterval(() => {
                const img = allPhotos[Math.floor(Math.random() * allPhotos.length)];
                const el = document.createElement('div');
                el.className = 'falling-photo polaroid';
                el.style.left = Math.random() * 80 + 'vw';
                el.style.animationDuration = (Math.random() * 2 + 4) + 's';
                el.onclick = (e) => { 
                    e.stopPropagation(); 
                    document.getElementById('bigImg').src = img; 
                    document.getElementById('photoViewer').style.display = 'flex'; 
                };
                el.innerHTML = `<img src="${img}"><p class="pol-cap" style="font-size:0.5rem">Pillu 💜</p>`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 7000);
            }, 800);
        }
    </script>
</body>
</html>
