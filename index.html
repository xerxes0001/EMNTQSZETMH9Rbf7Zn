<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rajashree ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; background: #080808; overflow: hidden; scroll-behavior: smooth; font-family: sans-serif; }
        .section { height: 100vh; width: 100vw; position: relative; display: flex; align-items: center; justify-content: center; }
        video, .reveal-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        /* Polaroid Rain Effect */
        .polaroid {
            background: #ffffff; padding: 5px 5px 20px 5px; border-radius: 2px;
            box-shadow: 0 5px 20px rgba(209, 179, 255, 0.4); width: 130px;
        }
        .polaroid img { width: 100%; height: auto; display: block; border: 1px solid #eee; object-fit: contain; }
        .pol-cap { color: #333; text-align: center; font-size: 0.7rem; font-weight: bold; margin-top: 5px; font-family: 'Georgia', serif; }

        .falling-photo {
            position: fixed; top: -25vh; z-index: 100;
            animation: fallDown linear forwards;
        }
        @keyframes fallDown { to { transform: translateY(125vh) rotate(360deg); } }

        /* Blur Reveal Logic */
        .blur-reveal { filter: blur(35px); transition: filter 2.5s ease-in-out; }
        .clear-now { filter: blur(0px) !important; }

        .caption { 
            position: relative; z-index: 10; color: #D1B3FF; font-size: 2.2rem; 
            font-weight: bold; text-align: center; text-shadow: 0 0 20px rgba(0,0,0,1);
        }
    </style>
</head>
<body>

    <div id="1d-music"></div>
    <audio id="reveal-audio" src="abhi-maza-ayagga.mp3"></audio>

    <section id="p1" class="section">
        <video id="v1" autoplay muted playsinline>
            <source src="1778037251143.mp4" type="video/mp4">
        </video>
        <div class="caption animate__animated animate__fadeInDown">Bevdi, Don, Pillu... ❤️</div>
    </section>

    <section id="p2" class="section">
        <video id="v2" muted playsinline>
            <source src="VID-20260124-WA0003(1).mp4" type="video/mp4">
        </video>
        <div class="caption">Raining Memories for You 💜</div>
    </section>

    <section id="p3" class="section">
        <img id="revealImg" src="bevdi" class="reveal-img blur-reveal">
        <div class="caption" id="finalCap">Wait for it...</div>
    </section>

    <script>
        // Full Photo List from your GitHub
        const photos = [
            'crybaby', 'don', 'aaji', 'haircut-1', 'haircut-2', 'holi-2-1', 
            'kurta-1', 'kurta-2', 'menhdi', 'red shirt', 'red shirt-2', 
            'traditional', 'trek', 'wedding', 'Holi grp', 'Holi-4'
        ];

        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const revealAudio = document.getElementById('reveal-audio');

        function playOneDirection() {
            const container = document.getElementById('1d-music');
            container.innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/QJO3ROT-A4E?autoplay=1" frameborder="0" allow="autoplay"></iframe>';
        }

        // Standard touch-to-start for mobile
        document.body.addEventListener('touchstart', () => {
            v1.play();
            playOneDirection();
        }, { once: true });

        // Phase 1 -> Phase 2
        v1.onended = () => {
            document.getElementById('p2').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => { v2.play(); }, 500);

            // Start Photo Snow
            setInterval(() => {
                const imgName = photos[Math.floor(Math.random() * photos.length)];
                createFallingPhoto(imgName);
            }, 900);
        };

        // Phase 2 -> Phase 3 Reveal
        v2.onended = () => {
            document.getElementById('p3').scrollIntoView({ behavior: 'smooth' });
            
            // Countdown for the "Abhi Maza Ayagga" reveal
            setTimeout(() => {
                // Clear the Blur
                document.getElementById('revealImg').classList.add('clear-now');
                document.getElementById('finalCap').innerHTML = "ABHI MAZA AAYEGA! 😈🔥";
                
                // Stop 1D and play Abhi Maza Ayagga
                document.getElementById('1d-music').innerHTML = ""; // Stop One Direction
                revealAudio.play();
            }, 3000); // 3 seconds delay for the drop
        };

        function createFallingPhoto(src) {
            const container = document.createElement('div');
            container.className = 'falling-photo polaroid';
            container.style.left = Math.random() * 80 + 'vw';
            container.style.animationDuration = (Math.random() * 3 + 4) + 's';
            // Note: src doesn't have .jpg extension based on your rename list
            container.innerHTML = `<img src="${src}"><p class="pol-cap">Pillu 💜</p>`;
            document.body.appendChild(container);
            setTimeout(() => container.remove(), 7500);
        }
    </script>
</body>
</html>
